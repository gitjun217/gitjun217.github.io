<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>벽돌깨기</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #1b2028;
      --line: #323a46;
      --text: #f2f5f8;
      --muted: #aab4c1;
      --accent: #46d3a5;
      --accent-2: #ffcf5c;
      --danger: #ff6b7a;
      --blue: #68a7ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 15%, rgba(70, 211, 165, 0.16), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(104, 167, 255, 0.13), transparent 28%),
        linear-gradient(145deg, #111318 0%, #171a21 58%, #0e1014 100%);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .app {
      width: min(94vw, 920px);
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: 0;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .stat {
      min-width: 86px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 32, 40, 0.86);
      text-align: center;
    }

    .stat strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      line-height: 1.1;
    }

    .stage {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0d1117;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      max-height: 72vh;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(180deg, #111722 0%, #0c1017 100%);
      background-size: 28px 28px, 28px 28px, auto;
      cursor: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(10, 13, 18, 0.68);
      text-align: center;
    }

    .overlay[hidden] {
      display: none;
    }

    .dialog {
      width: min(100%, 420px);
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 32, 40, 0.96);
    }

    .dialog h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .dialog p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 11px 18px;
      background: var(--accent);
      color: #07120f;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    kbd {
      display: inline-block;
      min-width: 24px;
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 5px;
      background: var(--panel);
      color: var(--text);
      font: 700 12px ui-monospace, SFMono-Regular, Consolas, monospace;
      text-align: center;
    }

    @media (max-width: 640px) {
      .app {
        width: 100vw;
        padding: 10px;
      }

      .topbar,
      .controls {
        align-items: flex-start;
        flex-direction: column;
      }

      .stats {
        justify-content: flex-start;
        width: 100%;
      }

      .stat {
        flex: 1;
        min-width: 74px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h1>벽돌깨기</h1>
      <div class="stats" aria-label="게임 상태">
        <div class="stat">점수<strong id="score">0</strong></div>
        <div class="stat">목숨<strong id="lives">3</strong></div>
        <div class="stat">레벨<strong id="level">1</strong></div>
      </div>
    </div>

    <section class="stage" aria-label="벽돌깨기 게임">
      <canvas id="game" width="960" height="600"></canvas>
      <div class="overlay" id="overlay">
        <div class="dialog">
          <h2 id="overlayTitle">준비 완료</h2>
          <p id="overlayText">마우스, 터치, 또는 방향키로 패들을 움직이세요. 공을 떨어뜨리지 말고 모든 벽돌을 깨면 다음 레벨로 넘어갑니다.</p>
          <button id="startButton" type="button">시작</button>
        </div>
      </div>
    </section>

    <div class="controls">
      <span><kbd>←</kbd> <kbd>→</kbd> 이동 · <kbd>Space</kbd> 시작/일시정지</span>
      <span>마우스와 터치도 지원합니다.</span>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const levelEl = document.getElementById("level");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startButton = document.getElementById("startButton");

    const W = canvas.width;
    const H = canvas.height;
    const keys = new Set();
    const brickColors = ["#68a7ff", "#46d3a5", "#ffcf5c", "#ff8e63", "#ff6b7a"];

    const state = {
      score: 0,
      lives: 3,
      level: 1,
      running: false,
      paused: false,
      lastTime: 0,
      pointerX: null,
      bricks: [],
      particles: [],
      paddle: { x: W / 2 - 70, y: H - 54, w: 140, h: 16, speed: 620 },
      ball: { x: W / 2, y: H - 76, r: 9, vx: 250, vy: -310, stuck: true }
    };

    function syncHud() {
      scoreEl.textContent = state.score;
      livesEl.textContent = state.lives;
      levelEl.textContent = state.level;
    }

    function showOverlay(title, text, buttonText = "시작") {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      startButton.textContent = buttonText;
      overlay.hidden = false;
    }

    function hideOverlay() {
      overlay.hidden = true;
    }

    function buildBricks() {
      state.bricks = [];
      const rows = Math.min(5 + state.level, 8);
      const cols = 10;
      const gap = 8;
      const top = 72;
      const side = 46;
      const brickW = (W - side * 2 - gap * (cols - 1)) / cols;
      const brickH = 26;

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const tough = row < Math.floor(state.level / 2) ? 2 : 1;
          state.bricks.push({
            x: side + col * (brickW + gap),
            y: top + row * (brickH + gap),
            w: brickW,
            h: brickH,
            hp: tough,
            maxHp: tough,
            color: brickColors[row % brickColors.length]
          });
        }
      }
    }

    function resetBall() {
      state.paddle.x = W / 2 - state.paddle.w / 2;
      state.ball.x = W / 2;
      state.ball.y = state.paddle.y - 18;
      const speedBoost = Math.min((state.level - 1) * 22, 120);
      state.ball.vx = 230 + speedBoost;
      state.ball.vy = -315 - speedBoost;
      state.ball.stuck = true;
    }

    function newGame() {
      state.score = 0;
      state.lives = 3;
      state.level = 1;
      state.paused = false;
      state.running = true;
      state.particles = [];
      buildBricks();
      resetBall();
      syncHud();
      hideOverlay();
      requestAnimationFrame(loop);
    }

    function nextLevel() {
      state.level += 1;
      state.particles = [];
      buildBricks();
      resetBall();
      syncHud();
      state.paused = true;
      showOverlay(`레벨 ${state.level}`, "좋아요. 공이 조금 더 빨라졌습니다.", "계속");
    }

    function launchOrResume() {
      if (!state.running) {
        newGame();
        return;
      }

      if (state.paused) {
        state.paused = false;
        hideOverlay();
        state.lastTime = performance.now();
        requestAnimationFrame(loop);
        return;
      }

      if (state.ball.stuck) {
        state.ball.stuck = false;
        hideOverlay();
      }
    }

    function loseLife() {
      state.lives -= 1;
      syncHud();
      if (state.lives <= 0) {
        state.running = false;
        showOverlay("게임 오버", `최종 점수는 ${state.score}점입니다.`, "다시 시작");
        return;
      }
      resetBall();
      showOverlay("한 번 더", "공을 놓쳤습니다. 패들을 맞춰 다시 출발하세요.", "계속");
    }

    function makeParticles(x, y, color) {
      for (let i = 0; i < 8; i += 1) {
        state.particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 260,
          vy: (Math.random() - 0.7) * 220,
          life: 0.55,
          color
        });
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function speedUpBall(multiplier = 1.018) {
      const ball = state.ball;
      const currentSpeed = Math.hypot(ball.vx, ball.vy);
      const maxSpeed = 760 + state.level * 30;
      const nextSpeed = Math.min(currentSpeed * multiplier, maxSpeed);
      const scale = nextSpeed / currentSpeed;
      ball.vx *= scale;
      ball.vy *= scale;
    }

    function updatePaddle(dt) {
      if (state.pointerX !== null) {
        state.paddle.x = clamp(state.pointerX - state.paddle.w / 2, 10, W - state.paddle.w - 10);
      }

      let dir = 0;
      if (keys.has("ArrowLeft") || keys.has("a")) dir -= 1;
      if (keys.has("ArrowRight") || keys.has("d")) dir += 1;
      state.paddle.x = clamp(state.paddle.x + dir * state.paddle.speed * dt, 10, W - state.paddle.w - 10);

      if (state.ball.stuck) {
        state.ball.x = state.paddle.x + state.paddle.w / 2;
        state.ball.y = state.paddle.y - state.ball.r - 3;
      }
    }

    function updateBall(dt) {
      const ball = state.ball;
      if (ball.stuck) return;

      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      if (ball.x - ball.r < 0) {
        ball.x = ball.r;
        ball.vx *= -1;
      } else if (ball.x + ball.r > W) {
        ball.x = W - ball.r;
        ball.vx *= -1;
      }

      if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy *= -1;
      }

      const p = state.paddle;
      const withinX = ball.x + ball.r > p.x && ball.x - ball.r < p.x + p.w;
      const withinY = ball.y + ball.r > p.y && ball.y - ball.r < p.y + p.h;
      if (withinX && withinY && ball.vy > 0) {
        const hit = (ball.x - (p.x + p.w / 2)) / (p.w / 2);
        const speed = Math.hypot(ball.vx, ball.vy) * 1.012;
        const angle = hit * 1.05;
        ball.vx = Math.sin(angle) * speed;
        ball.vy = -Math.cos(angle) * speed;
        ball.y = p.y - ball.r - 1;
      }

      for (const brick of state.bricks) {
        if (brick.hp <= 0) continue;
        if (
          ball.x + ball.r > brick.x &&
          ball.x - ball.r < brick.x + brick.w &&
          ball.y + ball.r > brick.y &&
          ball.y - ball.r < brick.y + brick.h
        ) {
          const overlapLeft = ball.x + ball.r - brick.x;
          const overlapRight = brick.x + brick.w - (ball.x - ball.r);
          const overlapTop = ball.y + ball.r - brick.y;
          const overlapBottom = brick.y + brick.h - (ball.y - ball.r);
          const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

          if (minOverlap === overlapLeft || minOverlap === overlapRight) {
            ball.vx *= -1;
          } else {
            ball.vy *= -1;
          }

          brick.hp -= 1;
          speedUpBall(brick.hp <= 0 ? 1.024 : 1.014);
          if (brick.hp <= 0) {
            state.score += 10 * state.level;
            makeParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color);
          } else {
            state.score += 4 * state.level;
          }
          syncHud();
          break;
        }
      }

      if (ball.y - ball.r > H) {
        loseLife();
      }

      if (state.bricks.every((brick) => brick.hp <= 0)) {
        nextLevel();
      }
    }

    function updateParticles(dt) {
      for (const particle of state.particles) {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vy += 360 * dt;
        particle.life -= dt;
      }
      state.particles = state.particles.filter((particle) => particle.life > 0);
    }

    function update(dt) {
      updatePaddle(dt);
      updateBall(dt);
      updateParticles(dt);
    }

    function roundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.strokeStyle = "#222a35";
      for (let x = 28; x < W; x += 28) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 28; y < H; y += 28) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();

      for (const brick of state.bricks) {
        if (brick.hp <= 0) continue;
        ctx.fillStyle = brick.hp < brick.maxHp ? "#b9c4d3" : brick.color;
        roundedRect(brick.x, brick.y, brick.w, brick.h, 5);
        ctx.fill();
        ctx.fillStyle = "rgba(255, 255, 255, 0.28)";
        ctx.fillRect(brick.x + 6, brick.y + 5, brick.w - 12, 3);
      }

      const p = state.paddle;
      const paddleGradient = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y);
      paddleGradient.addColorStop(0, "#46d3a5");
      paddleGradient.addColorStop(0.5, "#f2f5f8");
      paddleGradient.addColorStop(1, "#68a7ff");
      ctx.fillStyle = paddleGradient;
      roundedRect(p.x, p.y, p.w, p.h, 8);
      ctx.fill();

      const ball = state.ball;
      const ballGradient = ctx.createRadialGradient(ball.x - 3, ball.y - 4, 2, ball.x, ball.y, ball.r + 4);
      ballGradient.addColorStop(0, "#ffffff");
      ballGradient.addColorStop(0.58, "#ffcf5c");
      ballGradient.addColorStop(1, "#ff8e63");
      ctx.fillStyle = ballGradient;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();

      for (const particle of state.particles) {
        ctx.globalAlpha = clamp(particle.life / 0.55, 0, 1);
        ctx.fillStyle = particle.color;
        ctx.fillRect(particle.x, particle.y, 4, 4);
      }
      ctx.globalAlpha = 1;
    }

    function loop(now) {
      if (!state.running || state.paused) return;
      const dt = Math.min((now - state.lastTime) / 1000 || 0, 0.03);
      state.lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function canvasPoint(clientX) {
      const rect = canvas.getBoundingClientRect();
      return ((clientX - rect.left) / rect.width) * W;
    }

    startButton.addEventListener("click", launchOrResume);

    canvas.addEventListener("pointermove", (event) => {
      state.pointerX = canvasPoint(event.clientX);
    });

    canvas.addEventListener("pointerdown", (event) => {
      state.pointerX = canvasPoint(event.clientX);
      launchOrResume();
    });

    canvas.addEventListener("pointerleave", () => {
      state.pointerX = null;
    });

    window.addEventListener("keydown", (event) => {
      if (["ArrowLeft", "ArrowRight", " ", "Spacebar"].includes(event.key)) {
        event.preventDefault();
      }

      if (event.key === " " || event.key === "Spacebar") {
        if (state.running && !state.ball.stuck && !state.paused) {
          state.paused = true;
          showOverlay("일시정지", "숨을 고르고 다시 이어갈 수 있습니다.", "계속");
        } else {
          launchOrResume();
        }
        return;
      }

      keys.add(event.key);
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.key);
    });

    buildBricks();
    resetBall();
    syncHud();
    draw();
  </script>
</body>
</html>
